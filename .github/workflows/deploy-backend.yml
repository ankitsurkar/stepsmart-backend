name: Deploy Backend Lambdas

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy lms-student Lambda
        run: |
          cd backend
          cp studentHandler.js index.js
          zip -j studentHandler.zip index.js
          aws lambda update-function-code --function-name lms-student --zip-file fileb://studentHandler.zip
          rm index.js studentHandler.zip

      - name: Deploy uploadAssignment Lambda
        run: |
          cd backend
          cp uploadAssignment.js index.js
          zip -j uploadAssignment.zip index.js
          aws lambda update-function-code --function-name uploadAssignment --zip-file fileb://uploadAssignment.zip
          rm index.js uploadAssignment.zip

      - name: Deploy lms-getStudentAssignments Lambda
        run: |
          cd backend
          cp getStudentAssignments.js index.js
          zip -j getStudentAssignments.zip index.js
          aws lambda update-function-code --function-name lms-getStudentAssignments --zip-file fileb://getStudentAssignments.zip
          rm index.js getStudentAssignments.zip

      - name: Deploy lms-admin Lambda
        run: |
          cd backend
          cp adminHandler.js index.js
          zip -j adminHandler.zip index.js
          aws lambda update-function-code --function-name lms-admin --zip-file fileb://adminHandler.zip
          rm index.js adminHandler.zip
